<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ABBE WORLD PRO</title>
    <style>
        body { margin: 0; overflow: hidden; background: #87CEEB; font-family: sans-serif; touch-action: none; }
        #start-overlay { position: fixed; top:0; left:0; width:100%; height:100%; background: #87CEEB; display: flex; align-items: center; justify-content: center; z-index: 9999; }
        #btn { padding: 30px; background: gold; border: 5px solid white; border-radius: 20px; font-size: 20px; font-weight: bold; }
        .controls { position: absolute; bottom: 20px; right: 20px; display: none; z-index: 100; }
        .jump { width: 80px; height: 80px; background: rgba(0,0,0,0.5); color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body>

    <div id="start-overlay">
        <div id="btn">🚀 اضغط هنا للبدء فوراً</div>
    </div>

    <div class="controls" id="game-ui">
        <div class="jump" id="jump-btn">JUMP</div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://unpkg.com/playroomkit/multiplayer.js"></script>

    <script>
        const { onPlayerJoin, insertCoin, MyPlayer } = Playroom;

        // زر البدء - استخدمنا ميزة اللمس المباشر للأيفون
        const startBtn = document.getElementById("btn");
        
        startBtn.onclick = function() {
            console.log("Button Clicked");
            document.getElementById("start-overlay").style.display = "none";
            document.getElementById("game-ui").style.display = "flex";
            
            // تشغيل اللعبة
            init();
        };

        async function init() {
            // محاولة الاتصال بالأونلاين دون تعطيل اللعبة
            insertCoin().catch(e => console.log("Playroom Offline Mode"));

            const scene = new THREE.Scene();
            scene.background = new THREE.Color(0x87CEEB);
            const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
            const renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.view);

            scene.add(new THREE.AmbientLight(0xffffff, 0.8));
            const light = new THREE.DirectionalLight(0xffffff, 1);
            light.position.set(10, 20, 10);
            scene.add(light);

            const floor = new THREE.Mesh(new THREE.PlaneGeometry(100, 100), new THREE.MeshStandardMaterial({ color: 0x34a853 }));
            floor.rotation.x = -Math.PI/2;
            scene.add(floor);

            const players = {};
            let move = { x: 0, y: 0 };

            onPlayerJoin((state) => {
                const char = new THREE.Group();
                const body = new THREE.Mesh(new THREE.BoxGeometry(1, 1.5, 0.5), new THREE.MeshStandardMaterial({color: state.getProfile().color.hex}));
                body.position.y = 0.75;
                const head = new THREE.Mesh(new THREE.SphereGeometry(0.4), new THREE.MeshStandardMaterial({color: 0xffdbac}));
                head.position.y = 1.7;
                char.add(body, head);
                scene.add(char);
                players[state.id] = { char, state, vY: 0 };
            });

            // تحكم لمس بسيط جداً
            window.ontouchmove = (e) => {
                const t = e.touches[0];
                move.x = (t.clientX - window.innerWidth/2) * 0.005;
                move.y = (t.clientY - window.innerHeight/2) * 0.005;
            };
            window.ontouchend = () => { move = { x: 0, y: 0 }; };

            function animate() {
                requestAnimationFrame(animate);
                const my = MyPlayer();
                if(my && players[my.id]) {
                    const p = players[my.id];
                    p.char.position.x += move.x;
                    p.char.position.z += move.y;
                    my.setState("pos", {x: p.char.position.x, z: p.char.position.z});
                    
                    camera.position.set(p.char.position.x, 5, p.char.position.z + 10);
                    camera.lookAt(p.char.position.x, 1, p.char.position.z);
                }
                renderer.render(scene, camera);
            }
            animate();
        }
    </script>
</body>
</html>
