<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ABBE WORLD: ANIME CITY 🌍</title>
    <style>
        body { margin: 0; overflow: hidden; background: #87CEEB; touch-action: none; -webkit-user-select: none; font-family: 'Comic Sans MS', cursive, sans-serif; }
        #overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #a0d8ef; display: flex; align-items: center; justify-content: center; z-index: 10000; flex-direction: column; }
        #btn-start { padding: 25px 50px; background: #FF4500; border: 5px solid white; border-radius: 50px; font-size: 22px; font-weight: bold; color: white; box-shadow: 0 10px 20px rgba(0,0,0,0.3); cursor: pointer; }
        #overlay h1 { color: white; text-shadow: 0 0 20px #ff0066; }
        .controls { position: absolute; bottom: 40px; right: 20px; display: none; flex-direction: column; gap: 15px; z-index: 100; pointer-events: auto; }
        .btn-game { width: 75px; height: 75px; background: rgba(255,255,255,0.4); border: 3px solid white; border-radius: 50%; color: #333; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 14px; backdrop-filter: blur(5px); cursor: pointer; transition: 0.2s; }
        .btn-game:active { transform: scale(0.9); background: rgba(255,255,255,0.8); }
        #ui-header { position: absolute; top: 20px; width: 100%; text-align: center; color: white; font-weight: bold; text-shadow: 2px 2px 5px #f00; pointer-events: none; z-index: 50; display: none; font-size: 24px; }
        #slowmo-indicator { position: absolute; top: 80px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.6); color: #ffcc00; padding: 8px 20px; border-radius: 30px; font-size: 18px; display: none; z-index: 60; border: 2px solid #ffcc00; }
    </style>
</head>
<body>

    <div id="overlay">
        <h1>✨ ABBE WORLD ✨</h1>
        <button id="btn-start" onclick="startApp()">🚀 ابدأ المغامرة</button>
        <p style="color:white; margin-top:20px;">(اسحب يسار/يمين للتحكم، اضغط زر الرقص للحركة البطيئة)</p>
    </div>

    <div id="ui-header">مدينة ABBE الأسطورية 🏰</div>
    <div id="slowmo-indicator">🐢 حركة بطيئة فعالة</div>

    <div class="controls" id="game-ui">
        <div class="btn-game" id="jump-btn">قفز 🦘</div>
        <div class="btn-game" id="dance-btn">رقص 💃</div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script>
        function startApp() {
            document.getElementById("overlay").style.display = "none";
            document.getElementById("game-ui").style.display = "flex";
            document.getElementById("ui-header").style.display = "block";
            initGame();
        }

        function initGame() {
            // ---------- الإعدادات الأساسية ----------
            const scene = new THREE.Scene();
            scene.background = new THREE.Color(0x87CEEB);
            
            const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 2000);
            const renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFSoftShadowMap;
            document.body.appendChild(renderer.domElement);

            // ---------- الإضاءة ----------
            const ambient = new THREE.AmbientLight(0xffffff, 0.6);
            scene.add(ambient);
            
            const sun = new THREE.DirectionalLight(0xfff5d1, 0.9);
            sun.position.set(30, 50, 30);
            sun.castShadow = true;
            sun.shadow.mapSize.width = 1024;
            sun.shadow.mapSize.height = 1024;
            sun.shadow.camera.near = 0.1;
            sun.shadow.camera.far = 200;
            sun.shadow.camera.left = -80;
            sun.shadow.camera.right = 80;
            sun.shadow.camera.top = 80;
            sun.shadow.camera.bottom = -80;
            scene.add(sun);
            
            const backLight = new THREE.DirectionalLight(0x88ccff, 0.3);
            backLight.position.set(-30, 20, -30);
            scene.add(backLight);

            // ---------- الخريطة ----------
            const radius = 120;
            const floor = new THREE.Mesh(
                new THREE.CircleGeometry(radius, 64),
                new THREE.MeshStandardMaterial({ color: 0x7cfc00, roughness: 0.8, metalness: 0.1 })
            );
            floor.rotation.x = -Math.PI / 2;
            floor.receiveShadow = true;
            scene.add(floor);

            // الطريق الدائري
            const roadGeo = new THREE.TorusGeometry(radius - 10, 3, 8, 100);
            const roadMat = new THREE.MeshStandardMaterial({ color: 0x444444, roughness: 0.7 });
            const road = new THREE.Mesh(roadGeo, roadMat);
            road.rotation.x = Math.PI / 2;
            road.receiveShadow = true;
            scene.add(road);

            // خطوط الطريق (علامات)
            for (let i = 0; i < 20; i++) {
                const ang = (i / 20) * Math.PI * 2;
                const x = Math.cos(ang) * (radius - 10);
                const z = Math.sin(ang) * (radius - 10);
                const marker = new THREE.Mesh(
                    new THREE.BoxGeometry(0.8, 0.1, 2),
                    new THREE.MeshBasicMaterial({ color: 0xffffff })
                );
                marker.position.set(x, 0.2, z);
                marker.rotation.y = -ang;
                scene.add(marker);
            }

            // ---------- المباني ----------
            const buildingColors = [0xffaa00, 0x44aaff, 0xff6b6b, 0x6bff6b, 0xff66b2, 0xffcc00];
            const buildingNames = ['مدرسة 🏫', 'بيتزا 🍕', 'مسرح 🎭', 'ألعاب 🎮', 'مثلجات 🍦', 'كوديز 🍭'];
            
            buildingColors.forEach((color, i) => {
                const ang = (i / buildingColors.length) * Math.PI * 2;
                const x = Math.cos(ang) * (radius - 25);
                const z = Math.sin(ang) * (radius - 25);
                
                const group = new THREE.Group();
                const height = 12 + Math.random() * 8;
                const body = new THREE.Mesh(
                    new THREE.BoxGeometry(10, height, 10),
                    new THREE.MeshStandardMaterial({ color: color, roughness: 0.3, metalness: 0.1 })
                );
                body.position.y = height / 2;
                body.castShadow = true;
                body.receiveShadow = true;
                group.add(body);

                // شبابيك
                const winMat = new THREE.MeshBasicMaterial({ color: 0x87CEEB });
                for (let row = 0; row < 4; row++) {
                    for (let col = -2; col <= 2; col++) {
                        const w = new THREE.Mesh(new THREE.PlaneGeometry(1.2, 1.8), winMat);
                        w.position.set(col * 1.8, 2.5 + row * 2.5, 5.05);
                        body.add(w);
                    }
                }

                // سقف
                const roof = new THREE.Mesh(
                    new THREE.ConeGeometry(7, 3, 4),
                    new THREE.MeshStandardMaterial({ color: 0xcc5555 })
                );
                roof.position.y = height + 1.5;
                roof.rotation.y = Math.PI / 4;
                group.add(roof);

                group.position.set(x, 0, z);
                group.lookAt(0, height/2, 0);
                scene.add(group);
            });

            // ---------- الأشجار ----------
            for (let i = 0; i < 40; i++) {
                const ang = Math.random() * Math.PI * 2;
                const dist = 20 + Math.random() * 30;
                const x = Math.cos(ang) * dist;
                const z = Math.sin(ang) * dist;
                
                const trunk = new THREE.Mesh(
                    new THREE.CylinderGeometry(0.4, 0.6, 4),
                    new THREE.MeshStandardMaterial({ color: 0x8B4513 })
                );
                trunk.position.set(x, 2, z);
                trunk.castShadow = true;
                trunk.receiveShadow = true;
                scene.add(trunk);

                const leaves = new THREE.Mesh(
                    new THREE.SphereGeometry(2 + Math.random() * 1.5, 6, 6),
                    new THREE.MeshStandardMaterial({ color: 0x228B22, roughness: 0.6 })
                );
                leaves.position.set(x, 4.5 + Math.random() * 1, z);
                leaves.castShadow = true;
                leaves.receiveShadow = true;
                scene.add(leaves);
            }

            // ---------- القطار ----------
            const trainGroup = new THREE.Group();
            const trainBody = new THREE.Mesh(
                new THREE.BoxGeometry(4, 3, 8),
                new THREE.MeshStandardMaterial({ color: 0xff0000, emissive: 0x440000 })
            );
            trainBody.position.y = 1.5;
            trainBody.castShadow = true;
            trainGroup.add(trainBody);
            
            // عجلات القطار
            const wheelMat = new THREE.MeshStandardMaterial({ color: 0x222222 });
            for (let side = -1; side <= 1; side+=2) {
                const w = new THREE.Mesh(new THREE.CylinderGeometry(0.5, 0.5, 0.3, 8), wheelMat);
                w.rotation.z = Math.PI/2;
                w.position.set(side * 1.8, 0.3, 2.5);
                trainGroup.add(w);
                const w2 = new THREE.Mesh(new THREE.CylinderGeometry(0.5, 0.5, 0.3, 8), wheelMat);
                w2.rotation.z = Math.PI/2;
                w2.position.set(side * 1.8, 0.3, -2.5);
                trainGroup.add(w2);
            }
            
            scene.add(trainGroup);
            let trainAngle = 0;

            // ---------- شخصية الأنمي المحسنة ----------
            function createAnimeCharacter(color = 0xff3333) {
                const group = new THREE.Group();

                // الجسم
                const body = new THREE.Mesh(
                    new THREE.BoxGeometry(1.2, 1.6, 0.8),
                    new THREE.MeshStandardMaterial({ color: color, roughness: 0.3 })
                );
                body.position.y = 0.8;
                body.castShadow = true;
                group.add(body);

                // الرأس
                const head = new THREE.Mesh(
                    new THREE.SphereGeometry(0.6, 16, 16),
                    new THREE.MeshStandardMaterial({ color: 0xffddbb, roughness: 0.2 })
                );
                head.position.y = 1.8;
                head.castShadow = true;
                group.add(head);

                // العيون (أنمي كبيرة)
                const eyeMat = new THREE.MeshBasicMaterial({ color: 0xffffff });
                const pupilMat = new THREE.MeshBasicMaterial({ color: 0x222222 });
                for (let side = -1; side <= 1; side+=2) {
                    const eye = new THREE.Mesh(new THREE.SphereGeometry(0.2, 12, 12), eyeMat);
                    eye.position.set(side * 0.25, 1.95, 0.55);
                    group.add(eye);
                    // بؤبؤ
                    const pupil = new THREE.Mesh(new THREE.SphereGeometry(0.08, 8, 8), pupilMat);
                    pupil.position.set(side * 0.30, 1.93, 0.65);
                    group.add(pupil);
                }

                // الشعر (أسلوب أنمي - قبعة/شعر مدبب)
                const hair = new THREE.Mesh(
                    new THREE.ConeGeometry(0.7, 0.5, 8),
                    new THREE.MeshStandardMaterial({ color: 0xcc8833 })
                );
                hair.position.y = 2.15;
                hair.rotation.x = 0.1;
                group.add(hair);
                // خصلات
                for (let i = 0; i < 3; i++) {
                    const spike = new THREE.Mesh(
                        new THREE.ConeGeometry(0.1, 0.4, 4),
                        new THREE.MeshStandardMaterial({ color: 0xcc8833 })
                    );
                    spike.position.set(0.2 * (i-1), 2.3, 0.4 * (i-1) - 0.2);
                    spike.rotation.x = 0.3;
                    group.add(spike);
                }

                // وشاح (أنمي)
                const scarf = new THREE.Mesh(
                    new THREE.TorusGeometry(0.4, 0.08, 6, 12),
                    new THREE.MeshStandardMaterial({ color: 0xff0066 })
                );
                scarf.position.set(0, 1.4, 0.2);
                scarf.rotation.x = Math.PI/2;
                scarf.scale.set(1, 1, 0.5);
                group.add(scarf);

                return group;
            }

            const myAvatar = createAnimeCharacter(0xff3333);
            myAvatar.position.set(0, 0, 0);
            scene.add(myAvatar);

            // شخصية إضافية (زائر)
            const npc = createAnimeCharacter(0x33aaff);
            npc.position.set(15, 0, 15);
            scene.add(npc);

            // ---------- متغيرات الحركة والتباطؤ ----------
            let move = { x: 0, y: 0 };
            let camRotY = 0;
            let vY = 0;
            let isSlowMo = false;
            let slowMoTimer = 0;
            const SLOW_MO_DURATION = 3.0; // ثواني
            let timeScale = 1.0;
            
            // متغيرات لتتبع اللمس
            let touchStart = { x: 0, y: 0 };
            let isTouching = false;

            // ---------- التحكم باللمس والماوس ----------
            // للماوس (اختبار)
            let mouseDown = false;
            document.addEventListener('mousedown', (e) => {
                if (e.button === 0) {
                    mouseDown = true;
                    touchStart.x = e.clientX;
                    touchStart.y = e.clientY;
                }
            });
            document.addEventListener('mousemove', (e) => {
                if (!mouseDown) return;
                const dx = e.clientX - touchStart.x;
                const dy = e.clientY - touchStart.y;
                if (e.clientX < window.innerWidth / 2) {
                    move.x = dx * 0.01;
                    move.y = dy * 0.01;
                } else {
                    camRotY -= dx * 0.005;
                }
                touchStart.x = e.clientX;
                touchStart.y = e.clientY;
            });
            document.addEventListener('mouseup', () => {
                mouseDown = false;
                move.x = 0; move.y = 0;
            });

            // اللمس
            window.addEventListener('touchstart', (e) => {
                if (e.touches.length === 1) {
                    isTouching = true;
                    touchStart.x = e.touches[0].clientX;
                    touchStart.y = e.touches[0].clientY;
                }
            }, { passive: true });

            window.addEventListener('touchmove', (e) => {
                e.preventDefault();
                if (!isTouching || e.touches.length !== 1) return;
                const t = e.touches[0];
                const dx = t.clientX - touchStart.x;
                const dy = t.clientY - touchStart.y;
                if (t.clientX < window.innerWidth / 2) {
                    move.x = dx * 0.01;
                    move.y = dy * 0.01;
                } else {
                    camRotY -= dx * 0.005;
                }
                touchStart.x = t.clientX;
                touchStart.y = t.clientY;
            }, { passive: false });

            window.addEventListener('touchend', () => {
                isTouching = false;
                move.x = 0; move.y = 0;
            }, { passive: true });

            // أزرار اللعبة
            document.getElementById('jump-btn').addEventListener('click', () => {
                if (myAvatar.position.y < 0.1) {
                    vY = 0.35;
                }
            });

            document.getElementById('dance-btn').addEventListener('click', () => {
                // تفعيل الحركة البطيئة
                if (!isSlowMo) {
                    isSlowMo = true;
                    slowMoTimer = SLOW_MO_DURATION;
                    timeScale = 0.2;
                    document.getElementById('slowmo-indicator').style.display = 'block';
                    
                    // تأثير زوم على الكاميرا (تقريب)
                    // سيتم التعامل معه في animate
                    // إضافة دوران سريع للشخصية (يتم في animate)
                }
            });

            // ---------- كاميرا وهمية للزوم ----------
            let targetCamDist = 15;
            let currentCamDist = 15;

            // ---------- حلقة اللعبة ----------
            let clock = new THREE.Clock();

            function animate() {
                const delta = clock.getDelta();
                // تطبيق timeScale على delta
                const dt = delta * timeScale;

                requestAnimationFrame(animate);

                // تحديث مؤقت الحركة البطيئة
                if (isSlowMo) {
                    slowMoTimer -= dt;
                    if (slowMoTimer <= 0) {
                        isSlowMo = false;
                        timeScale = 1.0;
                        document.getElementById('slowmo-indicator').style.display = 'none';
                        targetCamDist = 15;
                    } else {
                        // أثناء التباطؤ، نقرب الكاميرا
                        targetCamDist = 5;
                    }
                } else {
                    targetCamDist = 15;
                }
                // تطبيق سلس للكاميرا
                currentCamDist += (targetCamDist - currentCamDist) * 0.05;

                // ----- تحريك القطار -----
                trainAngle += 0.005 * timeScale;
                trainGroup.position.x = Math.cos(trainAngle) * (radius - 10);
                trainGroup.position.z = Math.sin(trainAngle) * (radius - 10);
                trainGroup.rotation.y = -trainAngle + Math.PI/2;

                // ----- تحريك اللاعب -----
                const speed = 0.25 * timeScale;
                const forward = new THREE.Vector3(-Math.sin(camRotY), 0, -Math.cos(camRotY));
                const right = new THREE.Vector3(Math.cos(camRotY), 0, -Math.sin(camRotY));
                const moveVec = new THREE.Vector3(0, 0, 0);
                moveVec.addScaledVector(forward, -move.y); // لاحظ الإشارة حسب تجربة
                moveVec.addScaledVector(right, move.x);
                moveVec.y = 0;
                moveVec.normalize().multiplyScalar(speed);
                myAvatar.position.x += moveVec.x;
                myAvatar.position.z += moveVec.z;

                // الجاذبية والقفز
                myAvatar.position.y += vY * dt * 30; // تعديل السرعة
                vY -= 0.4 * dt * 30;
                if (myAvatar.position.y < 0) {
                    myAvatar.position.y = 0;
                    vY = 0;
                }

                // دوران الشخصية باتجاه الحركة
                if (moveVec.length() > 0.01) {
                    const targetAngle = Math.atan2(moveVec.x, moveVec.z);
                    myAvatar.rotation.y += (targetAngle - myAvatar.rotation.y) * 0.1;
                }

                // أثناء الحركة البطيئة: دوران إضافي للشخصية (رقص)
                if (isSlowMo) {
                    myAvatar.rotation.y += dt * 2.0;
                    // اهتزاز خفيف
                    myAvatar.position.y += Math.sin(Date.now() * 0.01) * 0.002;
                }

                // تحريك الـ NPC بشكل عشوائي
                npc.position.x += Math.sin(Date.now() * 0.001) * 0.01 * timeScale;
                npc.position.z += Math.cos(Date.now() * 0.0013) * 0.01 * timeScale;
                npc.rotation.y += 0.01 * timeScale;

                // ----- الكاميرا -----
                const camHeight = isSlowMo ? 3 : 8;
                const camOffset = new THREE.Vector3(
                    Math.sin(camRotY) * currentCamDist,
                    camHeight,
                    Math.cos(camRotY) * currentCamDist
                );
                camera.position.copy(myAvatar.position).add(camOffset);
                camera.lookAt(myAvatar.position.x, myAvatar.position.y + 1.5, myAvatar.position.z);

                // إضاءة متحركة
                sun.position.x = 50 * Math.sin(Date.now() * 0.0001);
                sun.position.z = 50 * Math.cos(Date.now() * 0.0001);

                renderer.render(scene, camera);
            }
            animate();

            // ضبط حجم النافذة
            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });
        }
    </script>
</body>
</html>
