<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ABBE WORLD: THE CITY</title>
    <style>
        body { margin: 0; overflow: hidden; background: #87CEEB; touch-action: none; -webkit-user-select: none; font-family: sans-serif; }
        #overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #111; display: flex; align-items: center; justify-content: center; z-index: 10000; }
        #btn-start { padding: 25px 50px; background: gold; border: 5px solid white; border-radius: 20px; font-size: 22px; font-weight: bold; color: black; }
        .controls { position: absolute; bottom: 40px; right: 20px; display: none; flex-direction: column; gap: 15px; z-index: 100; pointer-events: auto; }
        .btn-game { width: 75px; height: 75px; background: rgba(0,0,0,0.6); border: 2px solid gold; border-radius: 50%; color: white; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 14px; -webkit-tap-highlight-color: transparent; }
    </style>
</head>
<body>

    <div id="overlay">
        <button id="btn-start" onclick="startApp()">🚀 دخول عالم ABBE المطور 🚀</button>
    </div>

    <div class="controls" id="game-ui">
        <div class="btn-game" id="jump-btn">JUMP</div>
        <div class="btn-game" id="dance-btn">MJ DANCE</div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script>
        function startApp() {
            document.getElementById("overlay").style.display = "none";
            document.getElementById("game-ui").style.display = "flex";
            initGame();
        }

        function initGame() {
            const scene = new THREE.Scene();
            scene.background = new THREE.Color(0xa0d8ef);
            const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            const renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.body.appendChild(renderer.domElement);

            scene.add(new THREE.AmbientLight(0xffffff, 0.8));
            const sun = new THREE.DirectionalLight(0xffffff, 1);
            sun.position.set(10, 20, 10);
            scene.add(sun);

            // --- الخريطة الدائرية ---
            const floorRadius = 100;
            const floor = new THREE.Mesh(
                new THREE.CircleGeometry(floorRadius, 64),
                new THREE.MeshStandardMaterial({ color: 0x34a853 })
            );
            floor.rotation.x = -Math.PI / 2;
            scene.add(floor);

            // سور صغير للخريطة
            const edge = new THREE.Mesh(
                new THREE.TorusGeometry(floorRadius, 0.5, 16, 100),
                new THREE.MeshStandardMaterial({color: 0x555555})
            );
            edge.rotation.x = Math.PI/2;
            scene.add(edge);

            // --- وظيفة بناء الشخصيات (للاعب والـ NPCs) ---
            function createPerson(color, isNPC = false) {
                const g = new THREE.Group();
                const body = new THREE.Mesh(new THREE.BoxGeometry(0.8, 1.2, 0.5), new THREE.MeshStandardMaterial({color: color}));
                body.position.y = 0.6;
                const head = new THREE.Mesh(new THREE.BoxGeometry(0.6, 0.6, 0.6), new THREE.MeshStandardMaterial({color: 0xFFDB58}));
                head.position.y = 1.5;
                const eye = new THREE.Mesh(new THREE.BoxGeometry(0.1, 0.1, 0.1), new THREE.MeshBasicMaterial({color: isNPC ? "black" : "red"}));
                const eyeL = eye.clone(); eyeL.position.set(-0.15, 1.5, 0.31);
                const eyeR = eye.clone(); eyeR.position.set(0.15, 1.5, 0.31);
                g.add(body, head, eyeL, eyeR);
                return g;
            }

            // اللاعب الأساسي
            const myAvatar = createPerson("blue");
            scene.add(myAvatar);

            // --- إضافة شخصيات وهمية (NPCs) تتحرك ---
            const npcs = [];
            for(let i=0; i<8; i++) {
                const npc = createPerson(Math.random() * 0xffffff, true);
                npc.position.set(Math.random()*40-20, 0, Math.random()*40-20);
                npc.userData = { angle: Math.random() * Math.PI * 2, speed: 0.03 + Math.random()*0.03 };
                npcs.push(npc);
                scene.add(npc);
            }

            // --- إضافة أشجار ومباني ---
            function addBuilding(x, z, w, h, d, color) {
                const b = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), new THREE.MeshStandardMaterial({color: color}));
                b.position.set(x, h/2, z);
                scene.add(b);
            }
            addBuilding(-20, -30, 15, 12, 10, 0xeeeeee); // المدرسة
            addBuilding(20, -30, 10, 8, 8, 0xffcc00);  // مطعم البيتزا

            for(let i=0; i<12; i++) {
                const tx = Math.random()*120-60;
                const tz = Math.random()*120-60;
                if(Math.sqrt(tx*tx + tz*tz) < floorRadius - 5) {
                    const trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.3, 0.3, 3), new THREE.MeshStandardMaterial({color: 0x8B4513}));
                    const leaves = new THREE.Mesh(new THREE.SphereGeometry(1.5), new THREE.MeshStandardMaterial({color: 0x228B22}));
                    trunk.position.set(tx, 1.5, tz);
                    leaves.position.y = 2; trunk.add(leaves);
                    scene.add(trunk);
                }
            }

            camera.position.set(0, 10, 15);
            camera.lookAt(0, 0, 0);

            // --- تحكم ببجي المطور ---
            let move = { x: 0, y: 0 };
            let touchStart = { x: 0, y: 0 };
            let camRotY = 0;
            let vY = 0;
            let isDancing = false;

            window.addEventListener("touchstart", e => {
                touchStart.x = e.touches[0].clientX;
                touchStart.y = e.touches[0].clientY;
            });

            window.addEventListener("touchmove", e => {
                const t = e.touches[0];
                if (t.clientX < window.innerWidth / 2) {
                    move.x = (t.clientX - touchStart.x) * 0.01;
                    move.z = (t.clientY - touchStart.y) * 0.01;
                } else {
                    camRotY -= (t.clientX - touchStart.x) * 0.005;
                    touchStart.x = t.clientX;
                }
                e.preventDefault();
            }, {passive: false});

            window.addEventListener("touchend", () => move = { x: 0, y: 0 });

            document.getElementById("jump-btn").onclick = () => { if(myAvatar.position.y < 0.1) vY = 0.25; };
            document.getElementById("dance-btn").onclick = () => isDancing = !isDancing;

            function animate() {
                requestAnimationFrame(animate);
                
                // حركة اللاعب (محدودة داخل الدائرة)
                const s = 0.15;
                const nextX = myAvatar.position.x + (move.x * Math.cos(camRotY) + move.z * Math.sin(camRotY)) * s;
                const nextZ = myAvatar.position.z + (move.z * Math.cos(camRotY) - move.x * Math.sin(camRotY)) * s;
                
                if(Math.sqrt(nextX*nextX + nextZ*nextZ) < floorRadius - 2) {
                    myAvatar.position.x = nextX;
                    myAvatar.position.z = nextZ;
                }

                // حركة الـ NPCs (يمشون بشكل عشوائي)
                npcs.forEach(npc => {
                    npc.position.x += Math.cos(npc.userData.angle) * npc.userData.speed;
                    npc.position.z += Math.sin(npc.userData.angle) * npc.userData.speed;
                    if(Math.sqrt(npc.position.x**2 + npc.position.z**2) > floorRadius - 5) {
                        npc.userData.angle += Math.PI; // العودة عند لمس الحافة
                    }
                    npc.rotation.y = -npc.userData.angle + Math.PI/2;
                });

                // القفز والرقص
                myAvatar.position.y += vY; vY -= 0.01;
                if (myAvatar.position.y < 0) { myAvatar.position.y = 0; vY = 0; }
                if(isDancing) myAvatar.rotation.y += 0.1;

                // الكاميرا 360 درجة
                camera.position.set(myAvatar.position.x + Math.sin(camRotY)*10, myAvatar.position.y + 6, myAvatar.position.z + Math.cos(camRotY)*10);
                camera.lookAt(myAvatar.position.x, myAvatar.position.y + 1, myAvatar.position.z);

                renderer.render(scene, camera);
            }
            animate();
        }
    </script>
</body>
</html>
