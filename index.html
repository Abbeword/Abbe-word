<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ABBE WORLD DIAGNOSTIC</title>
    <style>
        body { margin: 0; overflow: hidden; background: skyblue; touch-action: none; font-family: sans-serif; }
        #status-log { position: absolute; top: 10px; left: 10px; background: rgba(0,0,0,0.8); color: #0f0; padding: 10px; font-size: 10px; z-index: 10001; pointer-events: none; max-width: 80%; }
        .label { position: absolute; background: gold; color: black; padding: 5px; border-radius: 5px; font-weight: bold; font-size: 10px; z-index: 100; transform: translate(-50%, -50%); }
        #jump-btn { position: absolute; bottom: 30px; right: 30px; width: 70px; height: 70px; background: red; color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; z-index: 10000; border: 3px solid white; }
    </style>
</head>
<body>

    <div id="status-log">جاري فحص النظام...</div>

    <div id="ui-labels">
        <div class="label" style="top: 30%; left: 30%;">المدرسة 🏫</div>
        <div class="label" style="top: 30%; left: 70%;">بيتزا 🍕</div>
        <div class="label" style="top: 50%; left: 50%;">سوبرمان 🦸‍♂️</div>
    </div>

    <div id="jump-btn">JUMP</div>

    <!-- تحميل المكتبة من رابط بديل -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script>
        const log = document.getElementById("status-log");
        function updateLog(msg) { log.innerHTML += "<br>> " + msg; }

        window.onerror = function(m, s, l) { updateLog("خطأ: " + m + " في سطر " + l); };

        window.onload = function() {
            updateLog("بدأ تحميل الصفحة...");
            if (typeof THREE === 'undefined') {
                updateLog("فشل تحميل Three.js! جاري المحاولة من مصدر آخر...");
                let s = document.createElement('script');
                s.src = "https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js";
                s.onload = init;
                document.head.appendChild(s);
            } else {
                init();
            }
        };

        function init() {
            updateLog("المكتبة جاهزة. جاري تشغيل المحرك...");
            
            try {
                const scene = new THREE.Scene();
                scene.background = new THREE.Color(0x87CEEB);

                const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
                const renderer = new THREE.WebGLRenderer({ antialias: false, alpha: true });
                renderer.setSize(window.innerWidth, window.innerHeight);
                renderer.setPixelRatio(1); // تقليل الجودة لضمان العمل على الأيفون
                document.body.appendChild(renderer.domElement);

                updateLog("تم إنشاء لوحة الرسم (Canvas)");

                // أرضية حمراء فاقعة جداً (عشان ما تضيع)
                const floor = new THREE.Mesh(
                    new THREE.PlaneGeometry(200, 200),
                    new THREE.MeshBasicMaterial({ color: 0xff0000 })
                );
                floor.rotation.x = -Math.PI / 2;
                scene.add(floor);

                // سوبرمان (مكعب أبيض كبير بوشاح أحمر)
                const player = new THREE.Group();
                const body = new THREE.Mesh(new THREE.BoxGeometry(2, 4, 1), new THREE.MeshBasicMaterial({color: 0x0000ff}));
                body.position.y = 2;
                const head = new THREE.Mesh(new THREE.SphereGeometry(1), new THREE.MeshBasicMaterial({color: 0xffdbac}));
                head.position.y = 4.5;
                const cape = new THREE.Mesh(new THREE.PlaneGeometry(3, 5), new THREE.MeshBasicMaterial({color: 0xff0000, side: THREE.DoubleSide}));
                cape.position.set(0, 2.5, -0.6);
                player.add(body, head, cape);
                scene.add(player);

                camera.position.set(0, 10, 20);
                camera.lookAt(0, 2, 0);

                updateLog("كل العناصر (الأرض، سوبرمان) تمت إضافتها");

                // تحكم لمس بسيط
                window.ontouchmove = (e) => {
                    const t = e.touches[0];
                    player.position.x = (t.clientX / window.innerWidth - 0.5) * 20;
                    player.position.z = (t.clientY / window.innerHeight - 0.5) * 20;
                    camera.lookAt(player.position.x, 2, player.position.z);
                };

                function animate() {
                    requestAnimationFrame(animate);
                    renderer.render(scene, camera);
                }
                animate();
                updateLog("الأنيميشن بدأ.. اللعبة تعمل الآن!");

            } catch (err) {
                updateLog("خطأ فادح في المحرك: " + err.message);
            }
        }
    </script>
</body>
</html>
