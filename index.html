<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ABBE WORLD: THE BEGINNING</title>
    <style>
        body { margin: 0; overflow: hidden; background: #87CEEB; touch-action: none; font-family: sans-serif; }
        #start-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #87CEEB; display: flex; align-items: center; justify-content: center; z-index: 9999; }
        #btn-go { padding: 25px 50px; background: #FFD700; border: 5px solid white; border-radius: 20px; font-size: 20px; font-weight: bold; color: #000; box-shadow: 0 10px 20px rgba(0,0,0,0.2); }
        #ui { position: absolute; top: 10px; width: 100%; text-align: center; color: white; pointer-events: none; text-shadow: 2px 2px 5px #000; display: none; }
    </style>
</head>
<body>

    <div id="start-screen">
        <button id="btn-go">🚀 دخول عالم ABBE 🚀</button>
    </div>

    <div id="ui">ABBE WORLD: اسحب الشاشة لتتحرك</div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://unpkg.com/playroomkit/multiplayer.js"></script>

    <script>
        const { onPlayerJoin, insertCoin, MyPlayer } = Playroom;

        document.getElementById("btn-go").onclick = async () => {
            document.getElementById("start-screen").style.display = "none";
            document.getElementById("ui").style.display = "block";
            
            // بدء الأونلاين
            try { await insertCoin(); } catch(e) { console.log("Playroom skip"); }
            
            initGame();
        };

        function initGame() {
            const scene = new THREE.Scene();
            scene.background = new THREE.Color(0x87CEEB);
            const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            const renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            document.body.appendChild(renderer.domElement);

            // إضاءة
            scene.add(new THREE.AmbientLight(0xffffff, 0.7));
            const sun = new THREE.DirectionalLight(0xffffff, 1);
            sun.position.set(10, 20, 10);
            sun.castShadow = true;
            scene.add(sun);

            // الأرضية (عشب)
            const floor = new THREE.Mesh(
                new THREE.PlaneGeometry(1000, 1000),
                new THREE.MeshStandardMaterial({ color: 0x34a853 })
            );
            floor.rotation.x = -Math.PI / 2;
            floor.receiveShadow = true;
            scene.add(floor);

            // مبنى المدرسة
            const school = new THREE.Group();
            const wall = new THREE.Mesh(new THREE.BoxGeometry(10, 15, 10), new THREE.MeshStandardMaterial({color: 0xeeeeee}));
            wall.position.y = 7.5;
            school.add(wall);
            school.position.set(0, 0, -30);
            scene.add(school);

            const players = {};
            let moveInput = { x: 0, y: 0 };
            let touchStart = { x: 0, y: 0 };

            // نظام بناء الشخصيات (رأس أصفر وجسم ملون)
            function createAvatar(color) {
                const group = new THREE.Group();
                const torso = new THREE.Mesh(new THREE.BoxGeometry(0.8, 1.2, 0.4), new THREE.MeshStandardMaterial({color: color}));
                torso.position.y = 1.2;
                group.add(torso);
                const head = new THREE.Mesh(new THREE.BoxGeometry(0.6, 0.6, 0.6), new THREE.MeshStandardMaterial({color: 0xFFDB58}));
                head.position.y = 2.1;
                group.add(head);
                return group;
            }

            onPlayerJoin((state) => {
                const avatar = createAvatar(state.getProfile().color.hex);
                scene.add(avatar);
                players[state.id] = { avatar, state };
            });

            // تحكم اللمس (ببجي ستايل)
            window.addEventListener("touchstart", (e) => {
                touchStart.x = e.touches[0].clientX;
                touchStart.y = e.touches[0].clientY;
            });

            window.addEventListener("touchmove", (e) => {
                const t = e.touches[0];
                moveInput.x = (t.clientX - touchStart.x) * 0.005;
                moveInput.y = (t.clientY - touchStart.y) * 0.005;
            });

            window.addEventListener("touchend", () => { moveInput = { x: 0, y: 0 }; });

            function animate() {
                requestAnimationFrame(animate);
                const my = MyPlayer();

                Object.values(players).forEach(p => {
                    const isMe = my && p.state.id === my.id;
                    let pos = p.state.getState("pos") || {x:0, y:0, z:0};

                    if (isMe) {
                        pos.x += moveInput.x;
                        pos.z += moveInput.y;
                        p.state.setState("pos", pos);

                        // الكاميرا تتبع اللاعب
                        camera.position.set(pos.x, pos.y + 6, pos.z + 12);
                        camera.lookAt(pos.x, pos.y + 1, pos.z);
                    }

                    p.avatar.position.set(pos.x, pos.y, pos.z);
                });

                renderer.render(scene, camera);
            }
            animate();
        }
    </script>
</body>
</html>
