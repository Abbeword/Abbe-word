<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ABBE WORLD: ANIME CITY 🌍</title>
    <style>
        body { margin: 0; overflow: hidden; background: #87CEEB; touch-action: none; -webkit-user-select: none; font-family: 'Comic Sans MS', cursive, sans-serif; }
        #overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #a0d8ef; display: flex; align-items: center; justify-content: center; z-index: 10000; }
        #btn-start { padding: 25px 50px; background: #FF4500; border: 5px solid white; border-radius: 50px; font-size: 22px; font-weight: bold; color: white; box-shadow: 0 10px 20px rgba(0,0,0,0.3); }
        .controls { position: absolute; bottom: 40px; right: 20px; display: none; flex-direction: column; gap: 15px; z-index: 100; pointer-events: auto; }
        .btn-game { width: 75px; height: 75px; background: rgba(255,255,255,0.4); border: 3px solid white; border-radius: 50%; color: #333; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 14px; backdrop-filter: blur(5px); }
        #ui-header { position: absolute; top: 20px; width: 100%; text-align: center; color: white; font-weight: bold; text-shadow: 2px 2px 5px #f00; pointer-events: none; z-index: 50; display: none; font-size: 24px; }
    </style>
</head>
<body>

    <div id="overlay">
        <button id="btn-start" onclick="startApp()">✨ ابدأ مغامرة ABBE ✨</button>
    </div>

    <div id="ui-header">مدينة ABBE الأسطورية 🏰</div>

    <div class="controls" id="game-ui">
        <div class="btn-game" id="jump-btn">قفز 🦘</div>
        <div class="btn-game" id="dance-btn">رقص 💃</div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script>
        function startApp() {
            document.getElementById("overlay").style.display = "none";
            document.getElementById("game-ui").style.display = "flex";
            document.getElementById("ui-header").style.display = "block";
            initGame();
        }

        function initGame() {
            const scene = new THREE.Scene();
            scene.background = new THREE.Color(0x87CEEB);
            const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 2000);
            const renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.body.appendChild(renderer.domElement);

            scene.add(new THREE.AmbientLight(0xffffff, 0.9));
            const sun = new THREE.DirectionalLight(0xffffff, 0.8);
            sun.position.set(50, 100, 50);
            scene.add(sun);

            // --- الخريطة الدائرية ---
            const radius = 120;
            const floor = new THREE.Mesh(new THREE.CircleGeometry(radius, 64), new THREE.MeshStandardMaterial({ color: 0x7cfc00 }));
            floor.rotation.x = -Math.PI / 2;
            scene.add(floor);

            // الطريق الدائري للسيارات والقطار
            const roadGeo = new THREE.TorusGeometry(radius - 10, 3, 2, 100);
            const roadMat = new THREE.MeshStandardMaterial({color: 0x444444});
            const road = new THREE.Mesh(roadGeo, roadMat);
            road.rotation.x = Math.PI/2;
            scene.add(road);

            // --- بناء المدينة (المباني على الأطراف) ---
            const locations = [
                { name: "المدرسة 🏫", color: 0xffffff, angle: 0 },
                { name: "بيتزا 🍕", color: 0xffcc00, angle: 1 },
                { name: "المسرح 🎭", color: 0xff4444, angle: 2 },
                { name: "الألعاب 🎮", color: 0x00ccff, angle: 3 },
                { name: "مثلجات 🍦", color: 0xff99cc, angle: 4 },
                { name: "كوديز 🍭", color: 0x99ff99, angle: 5 }
            ];

            locations.forEach((loc, i) => {
                const ang = (i / locations.length) * Math.PI * 2;
                const x = Math.cos(ang) * (radius - 25);
                const z = Math.sin(ang) * (radius - 25);
                
                const bGroup = new THREE.Group();
                const body = new THREE.Mesh(new THREE.BoxGeometry(12, 15, 12), new THREE.MeshStandardMaterial({color: loc.color}));
                body.position.y = 7.5;
                
                // إضافة شبابيك
                const winGeo = new THREE.PlaneGeometry(2, 2);
                const winMat = new THREE.MeshBasicMaterial({color: 0x87CEEB});
                const window1 = new THREE.Mesh(winGeo, winMat); window1.position.set(0, 10, 6.1);
                body.add(window1);

                bGroup.add(body);
                bGroup.position.set(x, 0, z);
                bGroup.lookAt(0, 7.5, 0);
                scene.add(bGroup);
            });

            // --- الحديقة المركزية والشجر ---
            for(let i=0; i<30; i++) {
                const ang = Math.random() * Math.PI * 2;
                const dist = Math.random() * 40;
                const tx = Math.cos(ang) * dist;
                const tz = Math.sin(ang) * dist;
                
                const trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.4, 0.6, 4), new THREE.MeshStandardMaterial({color: 0x8B4513}));
                const leaves = new THREE.Mesh(new THREE.SphereGeometry(2.5, 8, 8), new THREE.MeshStandardMaterial({color: 0x228B22}));
                trunk.position.set(tx, 2, tz);
                leaves.position.y = 3; trunk.add(leaves);
                scene.add(trunk);
            }

            // --- القطار ---
            const train = new THREE.Mesh(new THREE.BoxGeometry(4, 3, 8), new THREE.MeshStandardMaterial({color: 0xff0000}));
            scene.add(train);
            let trainAngle = 0;

            // --- وظيفة بناء شخصيات الأنمي ---
            function createAnimeHero(type, color) {
                const g = new THREE.Group();
                const body = new THREE.Mesh(new THREE.BoxGeometry(1, 1.4, 0.6), new THREE.MeshStandardMaterial({color: color}));
                body.position.y = 0.7;
                const head = new THREE.Mesh(new THREE.SphereGeometry(0.5, 16, 16), new THREE.MeshStandardMaterial({color: 0xffdbac}));
                head.position.y = 1.7;
                
                // الشعر أو القبعات
                if(type === 'mario') {
                    const hat = new THREE.Mesh(new THREE.BoxGeometry(0.7, 0.2, 0.7), new THREE.MeshBasicMaterial({color: "red"}));
                    hat.position.y = 0.4; head.add(hat);
                }
                
                g.add(body, head);
                return g;
            }

            const myAvatar = createAnimeHero('mario', "red");
            scene.add(myAvatar);

            // --- التحكم ---
            let move = { x: 0, y: 0 };
            let camRotY = 0;
            let vY = 0;
            let touchStart = { x: 0, y: 0 };

            window.addEventListener("touchstart", e => {
                touchStart.x = e.touches[0].clientX; touchStart.y = e.touches[0].clientY;
            });
            window.addEventListener("touchmove", e => {
                const t = e.touches[0];
                if (t.clientX < window.innerWidth / 2) {
                    move.x = (t.clientX - touchStart.x) * 0.01;
                    move.y = (t.clientY - touchStart.y) * 0.01;
                } else {
                    camRotY -= (t.clientX - touchStart.x) * 0.005;
                    touchStart.x = t.clientX;
                }
                e.preventDefault();
            }, {passive: false});
            window.addEventListener("touchend", () => move = { x: 0, y: 0 });

            document.getElementById("jump-btn").onclick = () => { if(myAvatar.position.y < 0.1) vY = 0.3; };

            function animate() {
                requestAnimationFrame(animate);
                
                // تحريك القطار
                trainAngle += 0.005;
                train.position.x = Math.cos(trainAngle) * (radius - 10);
                train.position.z = Math.sin(trainAngle) * (radius - 10);
                train.lookAt(Math.cos(trainAngle+0.1)*(radius-10), 1.5, Math.sin(trainAngle+0.1)*(radius-10));

                // حركة اللاعب
                const s = 0.2;
                myAvatar.position.x += (move.x * Math.cos(camRotY) + move.y * Math.sin(camRotY)) * s;
                myAvatar.position.z += (move.y * Math.cos(camRotY) - move.x * Math.sin(camRotY)) * s;
                
                myAvatar.position.y += vY; vY -= 0.012;
                if(myAvatar.position.y < 0) { myAvatar.position.y = 0; vY = 0; }

                // الكاميرا 360 درجة
                camera.position.set(myAvatar.position.x + Math.sin(camRotY)*15, myAvatar.position.y + 10, myAvatar.position.z + Math.cos(camRotY)*15);
                camera.lookAt(myAvatar.position.x, myAvatar.position.y + 2, myAvatar.position.z);

                renderer.render(scene, camera);
            }
            animate();
        }
    </script>
</body>
</html>
