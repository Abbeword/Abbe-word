<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ABBE WORLD DEBUG</title>
    <style>
        body { margin: 0; background: #87CEEB; overflow: hidden; touch-action: none; font-family: sans-serif; }
        #overlay { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: #87CEEB; display: flex; flex-direction: column; 
            align-items: center; justify-content: center; z-index: 9999; 
        }
        #big-btn { 
            padding: 40px; background: #FFD700; border: 8px solid white; 
            border-radius: 20px; font-size: 24px; font-weight: bold; color: black;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        #status-log { color: white; margin-top: 20px; font-size: 14px; }
    </style>
</head>
<body>

    <div id="overlay">
        <div id="big-btn" onclick="startSystem()">🚀 ابدأ اللعبة الآن</div>
        <div id="status-log">نظام ABBE جاهز للتشغيل...</div>
    </div>

    <!-- تحميل المكتبات مع التأكد من المصدر -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://unpkg.com/playroomkit/multiplayer.js"></script>

    <script>
        // تنبيه فوري عند تحميل الصفحة لنتأكد أن النسخة هي الجديدة
        console.log("Version 3.0 Loaded");

        function startSystem() {
            // 1. إخفاء الشاشة فوراً عند اللمس
            document.getElementById("overlay").style.display = "none";
            alert("تم استلام اللمس! جاري تشغيل المحرك...");

            try {
                initGame();
            } catch (err) {
                alert("حدث خطأ تقني: " + err.message);
            }
        }

        async function initGame() {
            // محاولة تشغيل الأونلاين
            if (typeof Playroom !== 'undefined') {
                Playroom.insertCoin().catch(e => console.log("Playroom skip"));
            } else {
                alert("تحذير: مكتبة الأونلاين لم تتحمل، سنلعب أوفلاين.");
            }

            // إعداد THREE.js
            const scene = new THREE.Scene();
            scene.background = new THREE.Color(0x87CEEB);
            const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            const renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.view);

            // إضاءة وأرضية
            scene.add(new THREE.AmbientLight(0xffffff, 0.8));
            const floor = new THREE.Mesh(
                new THREE.PlaneGeometry(100, 100), 
                new THREE.MeshStandardMaterial({ color: 0x228B22 })
            );
            floor.rotation.x = -Math.PI / 2;
            scene.add(floor);

            // مكعب يمثل اللاعب (في حال لم يشتغل الأونلاين فوراً)
            const cube = new THREE.Mesh(
                new THREE.BoxGeometry(1, 2, 1), 
                new THREE.MeshStandardMaterial({ color: 0xff0000 })
            );
            cube.position.y = 1;
            scene.add(cube);

            camera.position.set(0, 5, 10);
            camera.lookAt(0, 1, 0);

            // حركة بسيطة للمكعب عند لمس الشاشة
            window.ontouchmove = (e) => {
                const t = e.touches[0];
                cube.position.x = (t.clientX / window.innerWidth - 0.5) * 10;
                cube.position.z = (t.clientY / window.innerHeight - 0.5) * 10;
            };

            function animate() {
                requestAnimationFrame(animate);
                renderer.render(scene, camera);
            }
            animate();
            alert("المحرك يعمل! ابحث عن المكعب الأحمر.");
        }
    </script>
</body>
</html>
