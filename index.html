<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ABBE WORLD PRO 🌍</title>
    <style>
        body { margin: 0; overflow: hidden; background: #87CEEB; touch-action: none; -webkit-user-select: none; font-family: sans-serif; }
        #overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #87CEEB; display: flex; align-items: center; justify-content: center; z-index: 10000; }
        #btn-start { padding: 25px 50px; background: gold; border: 5px solid white; border-radius: 20px; font-size: 22px; font-weight: bold; box-shadow: 0 10px 20px rgba(0,0,0,0.3); }
        .controls { position: absolute; bottom: 40px; right: 20px; display: none; flex-direction: column; gap: 15px; z-index: 100; pointer-events: auto; }
        .btn-c { width: 80px; height: 80px; background: rgba(0,0,0,0.6); border: 2px solid gold; border-radius: 50%; color: white; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 16px; -webkit-tap-highlight-color: transparent; }
        #ui-text { position: absolute; top: 20px; width: 100%; text-align: center; color: white; font-weight: bold; text-shadow: 2px 2px 5px #000; pointer-events: none; z-index: 50; display: none; }
    </style>
</head>
<body>

    <div id="overlay">
        <button id="btn-start" onclick="startApp()">🚀 دخول ABBE WORLD 🚀</button>
    </div>

    <div id="ui-text">عالم ABBE: استكشف المدينة!</div>

    <div class="controls" id="game-ui">
        <div class="btn-c" id="jump-btn">JUMP</div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://unpkg.com/playroomkit/multiplayer.js"></script>

    <script>
        const { onPlayerJoin, insertCoin, MyPlayer } = Playroom;

        function startApp() {
            document.getElementById("overlay").style.display = "none";
            document.getElementById("game-ui").style.display = "flex";
            document.getElementById("ui-text").style.display = "block";
            initGame();
        }

        async function initGame() {
            const scene = new THREE.Scene();
            scene.background = new THREE.Color(0x87CEEB);
            const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
            const renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.body.appendChild(renderer.domElement);

            scene.add(new THREE.AmbientLight(0xffffff, 0.8));
            const sun = new THREE.DirectionalLight(0xffffff, 1);
            sun.position.set(10, 20, 10);
            scene.add(sun);

            // الأرضية (عشب واقعي)
            const floor = new THREE.Mesh(new THREE.PlaneGeometry(1000, 1000), new THREE.MeshStandardMaterial({ color: 0x34a853 }));
            floor.rotation.x = -Math.PI/2;
            scene.add(floor);

            // مدرسة (بناء بتصميم أجمل)
            const school = new THREE.Group();
            const body = new THREE.Mesh(new THREE.BoxGeometry(15, 10, 10), new THREE.MeshStandardMaterial({color: 0xeeeeee}));
            body.position.y = 5;
            const roof = new THREE.Mesh(new THREE.BoxGeometry(16, 2, 11), new THREE.MeshStandardMaterial({color: 0xaa0000}));
            roof.position.y = 11;
            school.add(body, roof);
            school.position.set(-15, 0, -25);
            scene.add(school);

            // مطعم بيتزا (أصفر)
            const pizza = new THREE.Mesh(new THREE.BoxGeometry(10, 6, 8), new THREE.MeshStandardMaterial({color: 0xffcc00}));
            pizza.position.set(15, 3, -25);
            scene.add(pizza);

            // شخصية ABBE (GUEST 1337)
            const avatar = new THREE.Group();
            const aBody = new THREE.Mesh(new THREE.BoxGeometry(0.8, 1.2, 0.4), new THREE.MeshStandardMaterial({color: 0x111111}));
            aBody.position.y = 0.6;
            const aHead = new THREE.Mesh(new THREE.BoxGeometry(0.6, 0.6, 0.6), new THREE.MeshStandardMaterial({color: 0xFFDB58}));
            aHead.position.y = 1.5;
            // أعين حمراء
            const eye = new THREE.Mesh(new THREE.BoxGeometry(0.1, 0.1, 0.1), new THREE.MeshBasicMaterial({color: 0xff0000}));
            const eyeL = eye.clone(); eyeL.position.set(-0.15, 1.5, 0.31);
            const eyeR = eye.clone(); eyeR.position.set(0.15, 1.5, 0.31);
            avatar.add(aBody, aHead, eyeL, eyeR);
            scene.add(avatar);

            camera.position.set(0, 6, 12);
            camera.lookAt(0, 0, 0);

            // التحكم
            let move = { x: 0, z: 0 };
            let touchStart = { x: 0, y: 0 };
            let vY = 0;

            window.addEventListener("touchstart", e => {
                if (e.touches[0].clientX < window.innerWidth / 2) {
                    touchStart.x = e.touches[0].clientX; touchStart.y = e.touches[0].clientY;
                }
            }, {passive: false});

            window.addEventListener("touchmove", e => {
                const t = e.touches[0];
                if (t.clientX < window.innerWidth / 2) {
                    move.x = (t.clientX - touchStart.x) * 0.008;
                    move.z = (t.clientY - touchStart.y) * 0.008;
                }
                e.preventDefault();
            }, {passive: false});

            window.addEventListener("touchend", () => move = { x: 0, z: 0 });

            // إصلاح زر القفز للأيفون
            const jumpBtn = document.getElementById("jump-btn");
            jumpBtn.addEventListener("touchstart", (e) => {
                if (avatar.position.y < 0.1) vY = 0.25;
                e.preventDefault();
            });

            // محاولة الأونلاين
            insertCoin().catch(() => {});

            function animate() {
                requestAnimationFrame(animate);
                
                avatar.position.x += move.x;
                avatar.position.z += move.z;

                // فيزياء القفز
                avatar.position.y += vY;
                vY -= 0.01;
                if (avatar.position.y < 0) { avatar.position.y = 0; vY = 0; }

                // تتبع الكاميرا
                camera.position.lerp(new THREE.Vector3(avatar.position.x, avatar.position.y + 6, avatar.position.z + 12), 0.1);
                camera.lookAt(avatar.position.x, 1, avatar.position.z);

                renderer.render(scene, camera);
            }
            animate();
        }
    </script>
</body>
</html>
