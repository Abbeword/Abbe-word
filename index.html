<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ABBE WORLD: FAST</title>
    <style>
        body { margin: 0; overflow: hidden; background: #87CEEB; touch-action: none; font-family: sans-serif; }
        #overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #87CEEB; display: flex; align-items: center; justify-content: center; z-index: 10000; }
        #btn { padding: 30px 60px; background: gold; border: 5px solid white; border-radius: 20px; font-size: 22px; font-weight: bold; }
        .ui-btns { position: absolute; bottom: 30px; right: 20px; display: none; flex-direction: column; gap: 10px; z-index: 100; }
        .btn-c { width: 70px; height: 70px; background: rgba(0,0,0,0.5); border: 2px solid white; border-radius: 50%; color: white; display: flex; align-items: center; justify-content: center; font-weight: bold; }
    </style>
</head>
<body>

    <div id="overlay">
        <div id="btn">🚀 ابدأ الآن</div>
    </div>

    <div class="ui-btns" id="controls">
        <div class="btn-c" id="jump">JUMP</div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://unpkg.com/playroomkit/multiplayer.js"></script>

    <script>
        const startBtn = document.getElementById("btn");
        
        // استخدام "touchstart" للأيفون لسرعة الاستجابة
        startBtn.addEventListener("touchstart", function(e) {
            e.preventDefault();
            startNow();
        });
        startBtn.onclick = startNow; // للأجهزة الأخرى

        function startNow() {
            document.getElementById("overlay").style.display = "none";
            document.getElementById("controls").style.display = "flex";
            init();
        }

        function init() {
            const scene = new THREE.Scene();
            scene.background = new THREE.Color(0x87CEEB);
            const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            const renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            document.body.appendChild(renderer.domElement);

            scene.add(new THREE.AmbientLight(0xffffff, 0.8));
            const floor = new THREE.Mesh(new THREE.PlaneGeometry(200, 200), new THREE.MeshStandardMaterial({ color: 0x34a853 }));
            floor.rotation.x = -Math.PI/2;
            scene.add(floor);

            // الشخصية (تظهر فوراً)
            const player = new THREE.Group();
            const body = new THREE.Mesh(new THREE.BoxGeometry(1, 1.5, 0.5), new THREE.MeshStandardMaterial({color: "blue"}));
            body.position.y = 0.75;
            const head = new THREE.Mesh(new THREE.BoxGeometry(0.6, 0.6, 0.6), new THREE.MeshStandardMaterial({color: "yellow"}));
            head.position.y = 1.7;
            player.add(body, head);
            scene.add(player);

            // المدرسة (تظهر فوراً)
            const school = new THREE.Mesh(new THREE.BoxGeometry(10, 8, 10), new THREE.MeshStandardMaterial({color: "white"}));
            school.position.set(0, 4, -20);
            scene.add(school);

            camera.position.set(0, 5, 10);
            camera.lookAt(0, 1, 0);

            let move = { x: 0, z: 0 };
            window.ontouchmove = (e) => {
                const t = e.touches[0];
                move.x = (t.clientX - window.innerWidth/2) * 0.005;
                move.z = (t.clientY - window.innerHeight/2) * 0.005;
            };
            window.ontouchend = () => move = { x: 0, z: 0 };

            // محاولة تشغيل الأونلاين بهدوء في الخلفية
            if(window.Playroom) {
                Playroom.insertCoin().catch(() => {});
            }

            function animate() {
                requestAnimationFrame(animate);
                player.position.x += move.x;
                player.position.z += move.y;
                camera.position.set(player.position.x, 5, player.position.z + 10);
                camera.lookAt(player.position.x, 1, player.position.z);
                renderer.render(scene, camera);
            }
            animate();
        }
    </script>
</body>
</html>
