<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ABBE WORLD: FAST START</title>
    <style>
        body { margin: 0; overflow: hidden; background: #87CEEB; touch-action: none; font-family: sans-serif; }
        #overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #87CEEB; display: flex; align-items: center; justify-content: center; z-index: 10000; }
        #start-btn { padding: 30px 60px; background: gold; border: 5px solid white; border-radius: 20px; font-size: 22px; font-weight: bold; color: black; box-shadow: 0 10px 20px rgba(0,0,0,0.2); }
        #ui-msg { position: absolute; top: 20px; width: 100%; text-align: center; color: white; font-weight: bold; pointer-events: none; text-shadow: 2px 2px 5px #000; z-index: 10; display: none; }
    </style>
</head>
<body>

    <div id="overlay">
        <button id="start-btn">🚀 دخول عالم ABBE الآن</button>
    </div>

    <div id="ui-msg">عالم ABBE: المس الشاشة لتتحرك</div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://unpkg.com/playroomkit/multiplayer.js"></script>

    <script>
        // دالة البدء الفوري
        document.getElementById("start-btn").onclick = function() {
            console.log("Start button pressed");
            document.getElementById("overlay").style.display = "none";
            document.getElementById("ui-msg").style.display = "block";
            
            // تشغيل المحرك فوراً
            initGame();

            // محاولة تشغيل الأونلاين في الخلفية بعد ثانية واحدة
            setTimeout(() => {
                if (typeof Playroom !== 'undefined') {
                    Playroom.insertCoin().catch(err => console.log("Online ignored: ", err));
                }
            }, 1000);
        };

        function initGame() {
            // 1. إعداد المشهد
            const scene = new THREE.Scene();
            scene.background = new THREE.Color(0x87CEEB);
            const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            const renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.body.appendChild(renderer.domElement);

            // 2. إضاءة
            scene.add(new THREE.AmbientLight(0xffffff, 0.7));
            const sun = new THREE.DirectionalLight(0xffffff, 1);
            sun.position.set(10, 20, 10);
            scene.add(sun);

            // 3. الأرضية
            const floor = new THREE.Mesh(
                new THREE.PlaneGeometry(1000, 1000),
                new THREE.MeshStandardMaterial({ color: 0x34a853 })
            );
            floor.rotation.x = -Math.PI / 2;
            scene.add(floor);

            // 4. بناء شخصية ABBE (مكعب برأس)
            const playerGroup = new THREE.Group();
            const body = new THREE.Mesh(new THREE.BoxGeometry(1, 1.5, 0.5), new THREE.MeshStandardMaterial({color: 0x0000ff}));
            body.position.y = 0.75;
            const head = new THREE.Mesh(new THREE.BoxGeometry(0.6, 0.6, 0.6), new THREE.MeshStandardMaterial({color: 0xFFDB58}));
            head.position.y = 1.7;
            playerGroup.add(body, head);
            scene.add(playerGroup);

            // مدرسة بسيطة
            const school = new THREE.Mesh(new THREE.BoxGeometry(10, 15, 10), new THREE.MeshStandardMaterial({color: 0xeeeeee}));
            school.position.set(0, 7.5, -30);
            scene.add(school);

            camera.position.set(0, 5, 10);
            camera.lookAt(0, 1, 0);

            // 5. تحكم اللمس
            let move = { x: 0, z: 0 };
            let touchStart = { x: 0, y: 0 };

            window.addEventListener("touchstart", e => {
                touchStart.x = e.touches[0].clientX;
                touchStart.y = e.touches[0].clientY;
            });

            window.addEventListener("touchmove", e => {
                const t = e.touches[0];
                move.x = (t.clientX - touchStart.x) * 0.005;
                move.z = (t.clientY - touchStart.y) * 0.005;
            });

            window.addEventListener("touchend", () => move = { x: 0, z: 0 });

            // 6. حلقة الحركة
            function animate() {
                requestAnimationFrame(animate);
                
                // تحريك الشخصية المحلية
                playerGroup.position.x += move.x;
                playerGroup.position.z += move.z;

                // مزامنة مع الأونلاين (إذا توفرت)
                if (typeof Playroom !== 'undefined' && Playroom.MyPlayer()) {
                    Playroom.MyPlayer().setState("pos", {x: playerGroup.position.x, z: playerGroup.position.z});
                }

                // الكاميرا تتبع اللاعب
                camera.position.set(playerGroup.position.x, 5, playerGroup.position.z + 10);
                camera.lookAt(playerGroup.position.x, 1, playerGroup.position.z);

                renderer.render(scene, camera);
            }
            animate();
        }
    </script>
</body>
</html>
