<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ABBE WORLD FIX</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; touch-action: none; }
        #start-screen { position: fixed; top:0; left:0; width:100%; height:100%; background: #87CEEB; display: flex; align-items: center; justify-content: center; z-index: 9999; }
        #start-btn { padding: 30px 60px; background: gold; border: none; border-radius: 20px; font-size: 20px; font-weight: bold; }
        #jump-btn { position: absolute; bottom: 40px; right: 40px; width: 80px; height: 80px; background: rgba(255,255,255,0.3); border: 2px solid white; border-radius: 50%; color: white; display: none; align-items: center; justify-content: center; z-index: 100; font-weight: bold; }
    </style>
</head>
<body>

    <div id="start-screen">
        <button id="start-btn">🚀 تشغيل عالم ABBE</button>
    </div>

    <div id="jump-btn">JUMP</div>

    <!-- تحميل المكتبة من رابط موثوق جداً -->
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>

    <script>
        const startBtn = document.getElementById("start-btn");
        
        startBtn.onclick = function() {
            document.getElementById("start-screen").style.display = "none";
            document.getElementById("jump-btn").style.display = "flex";
            try {
                init();
            } catch(e) {
                alert("خطأ: " + e.message);
            }
        };

        function init() {
            // 1. إعداد المحرك
            const scene = new THREE.Scene();
            scene.background = new THREE.Color(0x87CEEB); // سماء زرقاء

            const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            const renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            // 2. إضاءة قوية جداً
            const ambient = new THREE.AmbientLight(0xffffff, 1);
            scene.add(ambient);

            // 3. الأرضية (لون أحمر فاقع لكي تراه فوراً)
            const floorGeo = new THREE.PlaneGeometry(200, 200);
            const floorMat = new THREE.MeshBasicMaterial({ color: 0xff0000 });
            const floor = new THREE.Mesh(floorGeo, floorMat);
            floor.rotation.x = -Math.PI / 2;
            scene.add(floor);

            // 4. اللاعب (مكعب أبيض في المنتصف)
            const playerGeo = new THREE.BoxGeometry(2, 2, 2);
            const playerMat = new THREE.MeshBasicMaterial({ color: 0xffffff });
            const player = new THREE.Mesh(playerGeo, playerMat);
            player.position.y = 1;
            scene.add(player);

            // 5. المدرسة (مكعب أخضر قريب منك)
            const school = new THREE.Mesh(new THREE.BoxGeometry(5, 10, 5), new THREE.MeshBasicMaterial({color: 0x00ff00}));
            school.position.set(0, 5, -15);
            scene.add(school);

            // 6. الكاميرا (موضع مرتفع قليلاً)
            camera.position.set(0, 8, 20);
            camera.lookAt(0, 0, 0);

            // 7. تحكم اللمس (تحريك اللاعب بمجرد لمس الشاشة)
            let touchX = 0;
            let touchY = 0;
            window.addEventListener("touchstart", e => {
                touchX = e.touches[0].clientX;
                touchY = e.touches[0].clientY;
            });

            window.addEventListener("touchmove", e => {
                const dx = (e.touches[0].clientX - touchX) * 0.05;
                const dy = (e.touches[0].clientY - touchY) * 0.05;
                player.position.x += dx;
                player.position.z += dy;
                
                // الكاميرا تلحق اللاعب
                camera.position.x = player.position.x;
                camera.position.z = player.position.z + 20;
                camera.lookAt(player.position.x, 0, player.position.z);
                
                touchX = e.touches[0].clientX;
                touchY = e.touches[0].clientY;
            });

            // 8. القفز
            let vY = 0;
            document.getElementById("jump-btn").onclick = () => {
                if(player.position.y <= 1.1) vY = 0.4;
            };

            function animate() {
                requestAnimationFrame(animate);
                
                // جاذبية بسيطة
                player.position.y += vY;
                if(player.position.y > 1) {
                    vY -= 0.02;
                } else {
                    player.position.y = 1;
                    vY = 0;
                }

                renderer.render(scene, camera);
            }
            animate();
        }
    </script>
</body>
</html>
