<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ABBE WORLD 🌍</title>
    <style>
        body { margin: 0; overflow: hidden; background: #87CEEB; touch-action: none; -webkit-user-select: none; font-family: sans-serif; }
        #start-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #87CEEB; display: flex; align-items: center; justify-content: center; z-index: 10000; }
        #btn-start { padding: 25px 50px; background: gold; border: 5px solid white; border-radius: 20px; font-size: 20px; font-weight: bold; box-shadow: 0 10px 20px rgba(0,0,0,0.2); }
        .controls { position: absolute; bottom: 40px; right: 20px; display: none; flex-direction: column; gap: 15px; z-index: 100; pointer-events: auto; }
        .btn-game { width: 75px; height: 75px; background: rgba(0,0,0,0.6); border: 2px solid gold; border-radius: 50%; color: white; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 14px; }
    </style>
</head>
<body>

    <!-- وضعنا أمر التشغيل مباشرة داخل الزر onclick -->
    <div id="start-overlay">
        <button id="btn-start" onclick="forceStart()">🚀 دخول ABBE WORLD 🚀</button>
    </div>

    <div class="controls" id="controls-ui">
        <div class="btn-game" id="jump-btn">JUMP</div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://unpkg.com/playroomkit/multiplayer.js"></script>

    <script>
        function forceStart() {
            // رسالة تنبيه لنتأكد أن الزر استجاب
            console.log("Button Pressed");
            document.getElementById("start-overlay").style.display = "none";
            document.getElementById("controls-ui").style.display = "flex";
            
            if (typeof THREE === 'undefined') {
                alert("المكتبة لا تزال تتحمل.. انتظر ثواني واضغط مرة أخرى");
                location.reload(); // إعادة تحميل إذا فشل
                return;
            }
            initGame();
        }

        async function initGame() {
            const scene = new THREE.Scene();
            scene.background = new THREE.Color(0x87CEEB);
            const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
            const renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.body.appendChild(renderer.domElement);

            scene.add(new THREE.AmbientLight(0xffffff, 0.8));
            const sun = new THREE.DirectionalLight(0xffffff, 1);
            sun.position.set(10, 20, 10);
            scene.add(sun);

            // الأرضية
            const floor = new THREE.Mesh(new THREE.PlaneGeometry(1000, 1000), new THREE.MeshStandardMaterial({ color: 0x34a853 }));
            floor.rotation.x = -Math.PI/2;
            scene.add(floor);

            // المدرسة
            const school = new THREE.Mesh(new THREE.BoxGeometry(15, 10, 10), new THREE.MeshStandardMaterial({color: 0xeeeeee}));
            school.position.set(-15, 5, -30);
            scene.add(school);

            // الشخصية المحلية (تظهر فوراً)
            const player = new THREE.Group();
            const body = new THREE.Mesh(new THREE.BoxGeometry(0.9, 1.2, 0.4), new THREE.MeshStandardMaterial({color: "blue"}));
            body.position.y = 0.6;
            const head = new THREE.Mesh(new THREE.BoxGeometry(0.6, 0.6, 0.6), new THREE.MeshStandardMaterial({color: "yellow"}));
            head.position.y = 1.5;
            player.add(body, head);
            scene.add(player);

            camera.position.set(0, 8, 15);
            camera.lookAt(0, 0, 0);

            // تحكم اللمس
            let moveInput = { x: 0, z: 0 };
            let touchStart = { x: 0, y: 0 };

            window.addEventListener("touchstart", e => {
                touchStart.x = e.touches[0].clientX;
                touchStart.y = e.touches[0].clientY;
            }, {passive: false});

            window.addEventListener("touchmove", e => {
                const t = e.touches[0];
                moveInput.x = (t.clientX - touchStart.x) * 0.008;
                moveInput.z = (t.clientY - touchStart.y) * 0.008;
                e.preventDefault();
            }, {passive: false});

            window.addEventListener("touchend", () => { moveInput = { x: 0, z: 0 }; });

            // محاولة الأونلاين في الخلفية
            if(window.Playroom) {
                Playroom.insertCoin().catch(() => {});
            }

            function animate() {
                requestAnimationFrame(animate);
                player.position.x += moveInput.x;
                player.position.z += moveInput.z;
                camera.position.set(player.position.x, 8, player.position.z + 15);
                camera.lookAt(player.position.x, 0, player.position.z);
                renderer.render(scene, camera);
            }
            animate();
        }
    </script>
</body>
</html>
