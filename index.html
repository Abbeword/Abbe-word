<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ABBE WORLD ULTIMATE</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; touch-action: none; }
        #loading-screen { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: #87CEEB; display: flex; flex-direction: column; 
            align-items: center; justify-content: center; z-index: 9999; 
        }
        #btn-start { 
            padding: 25px 50px; background: gold; border: 5px solid white; 
            border-radius: 20px; font-size: 20px; font-weight: bold; 
        }
        canvas { display: block; width: 100vw; height: 100vh; }
    </style>
</head>
<body>

    <div id="loading-screen">
        <div id="btn-start">🚀 دخول عالم ABBE 🚀</div>
        <p style="color: white; margin-top: 10px;">اضغط للتشغيل الفوري</p>
    </div>

    <!-- تحميل مكتبة الرسم أولاً -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <!-- تحميل مكتبة الأونلاين ثانياً -->
    <script src="https://unpkg.com/playroomkit/multiplayer.js"></script>

    <script>
        const startBtn = document.getElementById("btn-start");

        startBtn.onclick = function() {
            // 1. إخفاء الشاشة فوراً
            document.getElementById("loading-screen").style.display = "none";
            
            // 2. تشغيل المحرك 3D فوراً (بدون انتظار السيرفر)
            try {
                startEngine();
            } catch(e) {
                alert("خطأ في المحرك: " + e);
            }
        };

        function startEngine() {
            // إعداد المشهد
            const scene = new THREE.Scene();
            scene.background = new THREE.Color(0x87CEEB);
            const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            const renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            // إضاءة
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.8);
            scene.add(ambientLight);
            const sun = new THREE.DirectionalLight(0xffffff, 1);
            sun.position.set(5, 10, 5);
            scene.add(sun);

            // الأرضية (يجب أن تظهر فوراً)
            const floor = new THREE.Mesh(
                new THREE.PlaneGeometry(100, 100),
                new THREE.MeshStandardMaterial({ color: 0x228B22 })
            );
            floor.rotation.x = -Math.PI / 2;
            scene.add(floor);

            // لاعب تجريبي (مكعب أحمر)
            const player = new THREE.Mesh(
                new THREE.BoxGeometry(1, 2, 1),
                new THREE.MeshStandardMaterial({ color: 0xff0000 })
            );
            player.position.y = 1;
            scene.add(player);

            camera.position.set(0, 5, 10);
            camera.lookAt(0, 1, 0);

            // تحكم اللمس
            let move = { x: 0, z: 0 };
            window.ontouchmove = (e) => {
                const t = e.touches[0];
                move.x = (t.clientX / window.innerWidth - 0.5) * 0.4;
                move.z = (t.clientY / window.innerHeight - 0.5) * 0.4;
            };
            window.ontouchend = () => move = { x: 0, z: 0 };

            // محاولة تشغيل الأونلاين في الخلفية
            if (typeof Playroom !== 'undefined') {
                Playroom.insertCoin().catch(() => console.log("اللعب الجماعي غير متاح حالياً"));
            }

            function animate() {
                requestAnimationFrame(animate);
                player.position.x += move.x;
                player.position.z += move.z;
                camera.position.x = player.position.x;
                camera.position.z = player.position.x + 10;
                camera.lookAt(player.position.x, 1, player.position.z);
                renderer.render(scene, camera);
            }
            animate();
            
            // رسالة تأكيد للنجاح
            console.log("Engine Started Successfully");
        }
    </script>
</body>
</html>
