<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ABBE WORLD 🌍</title>
    <style>
        body { margin: 0; overflow: hidden; background: #87CEEB; touch-action: none; font-family: sans-serif; }
        #start-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #87CEEB; display: flex; align-items: center; justify-content: center; z-index: 10000; }
        #start-btn { padding: 25px 50px; background: gold; border: 5px solid white; border-radius: 20px; font-size: 20px; font-weight: bold; }
        #game-ui { position: absolute; top: 10px; width: 100%; text-align: center; color: white; pointer-events: none; text-shadow: 2px 2px 5px #000; display: none; }
        .btns { position: absolute; bottom: 30px; right: 20px; display: none; flex-direction: column; gap: 10px; z-index: 100; }
        .btn-circle { width: 70px; height: 70px; background: rgba(0,0,0,0.5); border: 2px solid white; border-radius: 50%; color: white; display: flex; align-items: center; justify-content: center; font-weight: bold; pointer-events: auto; }
    </style>
</head>
<body>

    <div id="start-overlay">
        <button id="start-btn">🚀 دخول ABBE WORLD 🚀</button>
    </div>

    <div id="game-ui">ABBE WORLD: استكشف المدينة!</div>

    <div class="btns" id="ui-btns">
        <div class="btn-circle" id="jump-btn">JUMP</div>
        <div class="btn-circle" id="dance-btn">MJ DANCE</div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://unpkg.com/playroomkit/multiplayer.js"></script>

    <script>
        const { onPlayerJoin, insertCoin, MyPlayer } = Playroom;
        const startBtn = document.getElementById("start-btn");

        startBtn.onclick = function() {
            document.getElementById("start-overlay").style.display = "none";
            document.getElementById("game-ui").style.display = "block";
            document.getElementById("ui-btns").style.display = "flex";
            initGame();
        };

        async function initGame() {
            const scene = new THREE.Scene();
            scene.background = new THREE.Color(0xa0d8ef);
            const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
            const renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.body.appendChild(renderer.domElement);

            scene.add(new THREE.AmbientLight(0xffffff, 0.7));
            const sun = new THREE.DirectionalLight(0xffffff, 1);
            sun.position.set(10, 20, 10);
            scene.add(sun);

            // الأرضية (عشب)
            const floor = new THREE.Mesh(new THREE.PlaneGeometry(1000, 1000), new THREE.MeshStandardMaterial({ color: 0x34a853 }));
            floor.rotation.x = -Math.PI/2;
            scene.add(floor);

            // بناء المدرسة (School)
            const schoolGroup = new THREE.Group();
            const schoolBody = new THREE.Mesh(new THREE.BoxGeometry(15, 10, 10), new THREE.MeshStandardMaterial({color: 0xeeeeee}));
            schoolBody.position.y = 5;
            const roof = new THREE.Mesh(new THREE.ConeGeometry(8, 5, 4), new THREE.MeshStandardMaterial({color: 0xaa4444}));
            roof.position.y = 12.5; roof.rotation.y = Math.PI/4;
            schoolGroup.add(schoolBody, roof);
            schoolGroup.position.set(-20, 0, -30);
            scene.add(schoolGroup);

            // بناء مطعم البيتزا (Pizza Shop)
            const pizzaShop = new THREE.Mesh(new THREE.BoxGeometry(10, 6, 8), new THREE.MeshStandardMaterial({color: 0xffcc00}));
            pizzaShop.position.set(20, 3, -30);
            scene.add(pizzaShop);

            const players = {};
            let moveInput = { x: 0, y: 0 };
            let camRotY = 0;
            let touchStart = { x: 0, y: 0 };
            let danceMode = false;

            // بناء شخصية ABBE المتطورة
            function createAvatar(color) {
                const g = new THREE.Group();
                const body = new THREE.Mesh(new THREE.BoxGeometry(0.8, 1.2, 0.4), new THREE.MeshStandardMaterial({color: color}));
                body.position.y = 0.6;
                const head = new THREE.Mesh(new THREE.BoxGeometry(0.6, 0.6, 0.6), new THREE.MeshStandardMaterial({color: 0xFFDB58}));
                head.position.y = 1.5;
                // إضافة أعين Guest 1337
                const eye = new THREE.Mesh(new THREE.BoxGeometry(0.1, 0.1, 0.1), new THREE.MeshBasicMaterial({color: 0xff0000}));
                const eyeL = eye.clone(); eyeL.position.set(-0.15, 1.5, 0.31);
                const eyeR = eye.clone(); eyeR.position.set(0.15, 1.5, 0.31);
                g.add(body, head, eyeL, eyeR);
                return { g, head };
            }

            onPlayerJoin((state) => {
                const avatarData = createAvatar(state.getProfile().color.hex);
                scene.add(avatarData.g);
                players[state.id] = { ...avatarData, state, vY: 0 };
            });

            // تحكم اللمس (ببجي)
            window.addEventListener("touchstart", e => { touchStart.x = e.touches[0].clientX; touchStart.y = e.touches[0].clientY; });
            window.addEventListener("touchmove", e => {
                const t = e.touches[0];
                if (t.clientX < window.innerWidth / 2) {
                    moveInput.x = (t.clientX - touchStart.x) * 0.01;
                    moveInput.y = (t.clientY - touchStart.y) * 0.01;
                } else {
                    camRotY -= (t.clientX - touchStart.x) * 0.01;
                    touchStart.x = t.clientX;
                }
            });
            window.addEventListener("touchend", () => moveInput = { x: 0, y: 0 });

            document.getElementById("jump-btn").onclick = () => { if(players[MyPlayer()?.id].g.position.y < 0.1) players[MyPlayer()?.id].vY = 0.25; };
            document.getElementById("dance-btn").onclick = () => { danceMode = !danceMode; };

            try { await insertCoin(); } catch(e) {}

            function animate() {
                requestAnimationFrame(animate);
                const my = MyPlayer();
                Object.values(players).forEach(p => {
                    const isMe = my && p.state.id === my.id;
                    let pos = p.state.getState("pos") || {x:0, y:0, z:0};
                    let rot = p.state.getState("rot") || 0;

                    if(isMe) {
                        const s = 0.15;
                        pos.x += (moveInput.x * Math.cos(camRotY) + moveInput.y * Math.sin(camRotY)) * s;
                        pos.z += (moveInput.y * Math.cos(camRotY) - moveInput.x * Math.sin(camRotY)) * s;
                        if(Math.abs(moveInput.x) > 0.01) rot = Math.atan2(moveInput.x, moveInput.y) + camRotY;
                        
                        p.g.position.y += p.vY; p.vY -= 0.01;
                        if(p.g.position.y < 0) { p.g.position.y = 0; p.vY = 0; }
                        pos.y = p.g.position.y;
                        p.state.setState("pos", pos); p.state.setState("rot", rot);
                        
                        camera.position.set(pos.x + Math.sin(camRotY)*10, pos.y + 5, pos.z + Math.cos(camRotY)*10);
                        camera.lookAt(pos.x, pos.y + 1, pos.z);
                    }
                    p.g.position.set(pos.x, pos.y, pos.z); p.g.rotation.y = rot;
                    if(danceMode && isMe) p.g.position.y += Math.sin(Date.now()*0.01)*0.02;
                });
                renderer.render(scene, camera);
            }
            animate();
        }
    </script>
</body>
</html>
