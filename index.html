<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ABBE WORLD 🌍</title>
    <style>
        body { margin: 0; overflow: hidden; background: #87CEEB; touch-action: none; font-family: sans-serif; }
        #start-overlay { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: #87CEEB; display: flex; flex-direction: column; 
            align-items: center; justify-content: center; z-index: 9999; 
        }
        #btn-start { 
            padding: 30px 60px; background: gold; border: 5px solid white; 
            border-radius: 20px; font-size: 20px; font-weight: bold; box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }
        #status { color: white; margin-top: 15px; font-size: 14px; }
        .controls { position: absolute; bottom: 30px; right: 20px; display: none; flex-direction: column; gap: 10px; z-index: 100; }
        .btn-circle { width: 70px; height: 70px; background: rgba(0,0,0,0.5); border: 2px solid white; border-radius: 50%; color: white; display: flex; align-items: center; justify-content: center; font-weight: bold; pointer-events: auto; }
    </style>
</head>
<body>

    <div id="start-overlay">
        <button id="btn-start">🚀 تشغيل عالم ABBE 🚀</button>
        <div id="status">جاهز للبدء...</div>
    </div>

    <div class="controls" id="ui-btns">
        <div class="btn-circle" id="jump-btn">JUMP</div>
        <div class="btn-circle" id="dance-btn">DANCE</div>
    </div>

    <!-- تحميل المكتبات -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://unpkg.com/playroomkit/multiplayer.js"></script>

    <script>
        const startBtn = document.getElementById("btn-start");
        const statusText = document.getElementById("status");

        // دالة البدء عند اللمس
        startBtn.onclick = function() {
            console.log("Starting...");
            // 1. إخفاء شاشة البدء فوراً
            document.getElementById("start-overlay").style.display = "none";
            document.getElementById("ui-btns").style.display = "flex";
            
            // 2. تشغيل المحرك 3D فوراً
            try {
                initGame();
            } catch(e) {
                alert("حدث خطأ في تشغيل المحرك: " + e);
            }
        };

        function initGame() {
            const scene = new THREE.Scene();
            scene.background = new THREE.Color(0x87CEEB);
            const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            const renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.body.appendChild(renderer.domElement);

            // إضاءة
            scene.add(new THREE.AmbientLight(0xffffff, 0.8));
            const sun = new THREE.DirectionalLight(0xffffff, 1);
            sun.position.set(10, 20, 10);
            scene.add(sun);

            // الأرضية
            const floor = new THREE.Mesh(new THREE.PlaneGeometry(1000, 1000), new THREE.MeshStandardMaterial({ color: 0x34a853 }));
            floor.rotation.x = -Math.PI / 2;
            scene.add(floor);

            // المدرسة
            const school = new THREE.Mesh(new THREE.BoxGeometry(15, 10, 10), new THREE.MeshStandardMaterial({color: 0xeeeeee}));
            school.position.set(0, 5, -30);
            scene.add(school);

            // اللاعب المحلي (يظهر فوراً)
            const myAvatar = new THREE.Group();
            const body = new THREE.Mesh(new THREE.BoxGeometry(0.8, 1.2, 0.4), new THREE.MeshStandardMaterial({color: 0x0000ff}));
            body.position.y = 0.6;
            const head = new THREE.Mesh(new THREE.BoxGeometry(0.6, 0.6, 0.6), new THREE.MeshStandardMaterial({color: 0xFFDB58}));
            head.position.y = 1.5;
            const eye = new THREE.Mesh(new THREE.BoxGeometry(0.1, 0.1, 0.1), new THREE.MeshBasicMaterial({color: 0xff0000}));
            const eyeL = eye.clone(); eyeL.position.set(-0.15, 1.5, 0.31);
            const eyeR = eye.clone(); eyeR.position.set(0.15, 1.5, 0.31);
            myAvatar.add(body, head, eyeL, eyeR);
            scene.add(myAvatar);

            camera.position.set(0, 5, 10);
            camera.lookAt(0, 1, 0);

            // التحكم
            let move = { x: 0, y: 0 };
            let touchStart = { x: 0, y: 0 };
            window.addEventListener("touchstart", e => { touchStart.x = e.touches[0].clientX; touchStart.y = e.touches[0].clientY; });
            window.addEventListener("touchmove", e => {
                const t = e.touches[0];
                move.x = (t.clientX - touchStart.x) * 0.008;
                move.y = (t.clientY - touchStart.y) * 0.008;
            });
            window.addEventListener("touchend", () => move = { x: 0, y: 0 });

            // محاولة الاتصال بالأونلاين في الخلفية بعد البدء
            setTimeout(() => {
                if (window.Playroom) {
                    window.Playroom.insertCoin().catch(e => console.log("Offline Mode Active"));
                }
            }, 500);

            function animate() {
                requestAnimationFrame(animate);
                
                // تحريك اللاعب والكاميرا
                myAvatar.position.x += move.x;
                myAvatar.position.z += move.y;
                camera.position.x = myAvatar.position.x;
                camera.position.z = myAvatar.position.z + 10;
                camera.lookAt(myAvatar.position.x, 1, myAvatar.position.z);

                renderer.render(scene, camera);
            }
            animate();
        }
    </script>
</body>
</html>
