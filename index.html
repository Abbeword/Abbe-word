<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ABBE WORLD 🌍</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; touch-action: none; -webkit-user-select: none; font-family: sans-serif; }
        #start-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #87CEEB; display: flex; align-items: center; justify-content: center; z-index: 10000; }
        #btn-start { padding: 25px 50px; background: gold; border: 5px solid white; border-radius: 20px; font-size: 22px; font-weight: bold; color: black; }
        .controls { position: absolute; bottom: 40px; right: 20px; display: none; flex-direction: column; gap: 15px; z-index: 100; pointer-events: auto; }
        .btn-game { width: 75px; height: 75px; background: rgba(0,0,0,0.6); border: 2px solid gold; border-radius: 50%; color: white; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 14px; -webkit-tap-highlight-color: transparent; }
    </style>
</head>
<body>

    <div id="start-overlay">
        <button id="btn-start" onclick="startApp()">🚀 دخول ABBE WORLD 🚀</button>
    </div>

    <div class="controls" id="game-ui">
        <div class="btn-game" id="jump-btn">JUMP</div>
        <div class="btn-game" id="dance-btn">DANCE</div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://unpkg.com/playroomkit/multiplayer.js"></script>

    <script>
        function startApp() {
            document.getElementById("start-overlay").style.display = "none";
            document.getElementById("game-ui").style.display = "flex";
            initGame();
        }

        function initGame() {
            const scene = new THREE.Scene();
            scene.background = new THREE.Color(0x87CEEB);
            const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
            const renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.body.appendChild(renderer.domElement);

            scene.add(new THREE.AmbientLight(0xffffff, 0.8));
            const sun = new THREE.DirectionalLight(0xffffff, 1);
            sun.position.set(10, 20, 10);
            scene.add(sun);

            // --- الأرضية (تظهر فوراً) ---
            const floor = new THREE.Mesh(new THREE.PlaneGeometry(1000, 1000), new THREE.MeshStandardMaterial({ color: 0x34a853 }));
            floor.rotation.x = -Math.PI/2;
            scene.add(floor);

            // --- المباني (تظهر فوراً) ---
            const school = new THREE.Mesh(new THREE.BoxGeometry(15, 10, 10), new THREE.MeshStandardMaterial({color: 0xeeeeee}));
            school.position.set(-15, 5, -30);
            scene.add(school);

            const pizza = new THREE.Mesh(new THREE.BoxGeometry(10, 6, 8), new THREE.MeshStandardMaterial({color: 0xffcc00}));
            pizza.position.set(15, 3, -30);
            scene.add(pizza);

            // --- اللاعب المحلي (يظهر فوراً بدون انتظار الأونلاين) ---
            const myAvatar = new THREE.Group();
            const torso = new THREE.Mesh(new THREE.BoxGeometry(0.8, 1.2, 0.4), new THREE.MeshStandardMaterial({color: "blue"}));
            torso.position.y = 0.6;
            const head = new THREE.Mesh(new THREE.BoxGeometry(0.6, 0.6, 0.6), new THREE.MeshStandardMaterial({color: 0xFFDB58}));
            head.position.y = 1.5;
            const eyeL = new THREE.Mesh(new THREE.BoxGeometry(0.1, 0.1, 0.1), new THREE.MeshBasicMaterial({color: "red"}));
            eyeL.position.set(-0.15, 1.5, 0.31);
            const eyeR = eyeL.clone(); eyeR.position.set(0.15, 1.5, 0.31);
            myAvatar.add(torso, head, eyeL, eyeR);
            scene.add(myAvatar);

            camera.position.set(0, 6, 12);
            camera.lookAt(0, 1, 0);

            // --- التحكم ---
            let move = { x: 0, z: 0 };
            let touchStart = { x: 0, y: 0 };
            let camRotY = 0;
            let vY = 0;
            let isDancing = false;

            window.addEventListener("touchstart", e => {
                touchStart.x = e.touches[0].clientX;
                touchStart.y = e.touches[0].clientY;
            });

            window.addEventListener("touchmove", e => {
                const t = e.touches[0];
                if (t.clientX < window.innerWidth / 2) { // يسار: حركة
                    move.x = (t.clientX - touchStart.x) * 0.01;
                    move.z = (t.clientY - touchStart.y) * 0.01;
                } else { // يمين: تدوير كاميرا
                    camRotY -= (t.clientX - touchStart.x) * 0.005;
                    touchStart.x = t.clientX;
                }
                e.preventDefault();
            }, {passive: false});

            window.addEventListener("touchend", () => { move = { x: 0, z: 0 }; });

            document.getElementById("jump-btn").onclick = () => { if(myAvatar.position.y < 0.1) vY = 0.25; };
            document.getElementById("dance-btn").onclick = () => { isDancing = !isDancing; };

            // محاولة الاتصال بالأونلاين في الخلفية
            if (window.Playroom) {
                Playroom.insertCoin().catch(() => console.log("Offline mode"));
            }

            function animate() {
                requestAnimationFrame(animate);
                
                // تحريك الشخصية
                const s = 0.15;
                myAvatar.position.x += (move.x * Math.cos(camRotY) + move.z * Math.sin(camRotY)) * s;
                myAvatar.position.z += (move.z * Math.cos(camRotY) - move.x * Math.sin(camRotY)) * s;
                
                // القفز
                myAvatar.position.y += vY;
                vY -= 0.01;
                if (myAvatar.position.y < 0) { myAvatar.position.y = 0; vY = 0; }

                if(isDancing) myAvatar.rotation.y += 0.2;

                // تتبع الكاميرا
                camera.position.set(
                    myAvatar.position.x + Math.sin(camRotY) * 10,
                    myAvatar.position.y + 6,
                    myAvatar.position.z + Math.cos(camRotY) * 10
                );
                camera.lookAt(myAvatar.position.x, myAvatar.position.y + 1, myAvatar.position.z);

                renderer.render(scene, camera);
            }
            animate();
        }
    </script>
</body>
</html>
