<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ABBE WORLD: ANIME 🏰</title>
    <style>
        body { margin: 0; overflow: hidden; background: #87CEEB; touch-action: none; -webkit-user-select: none; font-family: 'Comic Sans MS', cursive, sans-serif; }
        #overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #fff; display: flex; align-items: center; justify-content: center; z-index: 10000; transition: 0.5s; }
        #btn-start { padding: 25px 60px; background: #FF4500; border: 8px solid #FFD700; border-radius: 60px; font-size: 26px; font-weight: bold; color: white; box-shadow: 0 15px 30px rgba(0,0,0,0.3); animation: pulse 2s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }
        .controls { position: absolute; bottom: 40px; right: 20px; display: none; flex-direction: column; gap: 15px; z-index: 100; pointer-events: auto; }
        .btn-c { width: 85px; height: 85px; background: rgba(255,255,255,0.7); border: 4px solid #FF4500; border-radius: 50%; color: #FF4500; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 16px; box-shadow: 0 5px 15px rgba(0,0,0,0.2); }
    </style>
</head>
<body>

    <div id="overlay">
        <button id="btn-start" onclick="startApp()">✨ دخول عالم الأنمي ✨</button>
    </div>

    <div class="controls" id="ui-btns">
        <div class="btn-c" id="jump-btn">قفز 🐰</div>
        <div class="btn-c" id="dance-btn">رقص 🎵</div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script>
        function startApp() {
            document.getElementById("overlay").style.opacity = "0";
            setTimeout(() => document.getElementById("overlay").style.display = "none", 500);
            document.getElementById("ui-btns").style.display = "flex";
            initGame();
        }

        function initGame() {
            const scene = new THREE.Scene();
            scene.background = new THREE.Color(0xa0e6ff);
            const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 2000);
            const renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.body.appendChild(renderer.domElement);

            scene.add(new THREE.AmbientLight(0xffffff, 0.9));
            const sun = new THREE.DirectionalLight(0xffffff, 0.8);
            sun.position.set(50, 100, 50);
            scene.add(sun);

            // --- الخريطة والحديقة ---
            const radius = 150;
            const floor = new THREE.Mesh(new THREE.CircleGeometry(radius, 64), new THREE.MeshStandardMaterial({ color: 0x99ff99 }));
            floor.rotation.x = -Math.PI / 2;
            scene.add(floor);

            // الحديقة المركزية
            const park = new THREE.Mesh(new THREE.CircleGeometry(40, 32), new THREE.MeshStandardMaterial({ color: 0x34a853 }));
            park.position.y = 0.01; park.rotation.x = -Math.PI / 2;
            scene.add(park);

            // الطريق الدائري
            const road = new THREE.Mesh(new THREE.TorusGeometry(radius - 20, 5, 2, 100), new THREE.MeshStandardMaterial({color: 0x888888}));
            road.position.y = 0.02; road.rotation.x = Math.PI/2;
            scene.add(road);

            // --- إنشاء لوحات المباني ---
            function createLabel(text, x, z) {
                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d');
                canvas.width = 256; canvas.height = 128;
                ctx.fillStyle = 'rgba(255, 69, 0, 0.8)';
                ctx.fillRect(0, 0, 256, 128);
                ctx.fillStyle = 'white';
                ctx.font = 'bold 40px Arial';
                ctx.textAlign = 'center';
                ctx.fillText(text, 128, 80);
                const texture = new THREE.CanvasTexture(canvas);
                const sprite = new THREE.Sprite(new THREE.SpriteMaterial({ map: texture }));
                sprite.position.set(x, 20, z);
                sprite.scale.set(10, 5, 1);
                scene.add(sprite);
            }

            // --- المباني الأنمي ---
            const buildings = [
                { name: "مدرسة 🏫", color: 0xffffff, pos: [-100, -60] },
                { name: "بيتزا 🍕", color: 0xffcc00, pos: [100, -60] },
                { name: "مسرح 🎭", color: 0xff4444, pos: [-100, 60] },
                { name: "ألعاب 🎮", color: 0x00ccff, pos: [100, 60] },
                { name: "مثلجات 🍦", color: 0xffaaff, pos: [0, -120] }
            ];

            buildings.forEach(loc => {
                const bGroup = new THREE.Group();
                const bBody = new THREE.Mesh(new THREE.BoxGeometry(20, 25, 20), new THREE.MeshStandardMaterial({color: loc.color}));
                bBody.position.y = 12.5;
                // أبواب وشبابيك
                const door = new THREE.Mesh(new THREE.PlaneGeometry(6, 10), new THREE.MeshBasicMaterial({color: 0x8b4513}));
                door.position.set(0, 5, 10.1); bBody.add(door);
                bGroup.add(bBody);
                bGroup.position.set(loc.pos[0], 0, loc.pos[1]);
                scene.add(bGroup);
                createLabel(loc.name, loc.pos[0], loc.pos[1]);
            });

            // --- بناء شخصيات الأنمي (Chibi Hero) ---
            function createAnimeChar(heroType, bodyCol) {
                const g = new THREE.Group();
                const torso = new THREE.Mesh(new THREE.CapsuleGeometry(0.5, 1, 4, 8), new THREE.MeshStandardMaterial({color: bodyCol}));
                torso.position.y = 1; g.add(torso);
                const head = new THREE.Mesh(new THREE.SphereGeometry(0.7, 16, 16), new THREE.MeshStandardMaterial({color: 0xffdbac}));
                head.position.y = 2.2; g.add(head);
                
                if(heroType === 'superman') { // وشاح سوبرمان
                    const cape = new THREE.Mesh(new THREE.PlaneGeometry(1.5, 2), new THREE.MeshStandardMaterial({color: "red", side: THREE.DoubleSide}));
                    cape.position.set(0, 1.5, -0.6); cape.rotation.x = 0.2; g.add(cape);
                }
                if(heroType === 'mario') { // قبعة ماريو
                    const hat = new THREE.Mesh(new THREE.CylinderGeometry(0.7, 0.7, 0.3), new THREE.MeshBasicMaterial({color: "red"}));
                    hat.position.y = 0.5; head.add(hat);
                }
                return g;
            }

            const myAvatar = createAnimeChar('superman', "blue");
            scene.add(myAvatar);

            // أشخاص وهميون (NPCs)
            const npcs = [];
            for(let i=0; i<15; i++) {
                const npc = createAnimeChar('none', Math.random()*0xffffff);
                npc.position.set(Math.random()*100-50, 0, Math.random()*100-50);
                npc.userData = { angle: Math.random()*Math.PI*2, speed: 0.05 + Math.random()*0.05 };
                npcs.push(npc); scene.add(npc);
            }

            // قطار ومركبات
            const train = new THREE.Mesh(new THREE.BoxGeometry(6, 4, 12), new THREE.MeshStandardMaterial({color: 0xff0000}));
            scene.add(train);
            let trainAngle = 0;

            // --- تحكم ببجي 360 ---
            let move = { x: 0, z: 0 }; let touchStart = { x: 0, y: 0 }; let camRotY = 0; let vY = 0;
            window.addEventListener("touchstart", e => { touchStart.x = e.touches[0].clientX; touchStart.y = e.touches[0].clientY; });
            window.addEventListener("touchmove", e => {
                const t = e.touches[0];
                if (t.clientX < window.innerWidth / 2) {
                    move.x = (t.clientX - touchStart.x) * 0.01; move.z = (t.clientY - touchStart.y) * 0.01;
                } else {
                    camRotY -= (t.clientX - touchStart.x) * 0.005; touchStart.x = t.clientX;
                }
                e.preventDefault();
            }, {passive: false});
            window.addEventListener("touchend", () => move = { x: 0, y: 0 });

            document.getElementById("jump-btn").onclick = () => { if(myAvatar.position.y < 0.1) vY = 0.3; };

            function animate() {
                requestAnimationFrame(animate);
                
                // حركة القطار
                trainAngle += 0.003;
                train.position.x = Math.cos(trainAngle) * (radius - 20);
                train.position.z = Math.sin(trainAngle) * (radius - 20);
                train.lookAt(Math.cos(trainAngle+0.1)*(radius-20), 2, Math.sin(trainAngle+0.1)*(radius-20));

                // حركة اللاعب
                const s = 0.25;
                myAvatar.position.x += (move.x * Math.cos(camRotY) + move.z * Math.sin(camRotY)) * s;
                myAvatar.position.z += (move.z * Math.cos(camRotY) - move.x * Math.sin(camRotY)) * s;
                
                myAvatar.position.y += vY; vY -= 0.015;
                if(myAvatar.position.y < 0) { myAv
